<!DOCTYPE html>
<html>
<head>
    <title>Soundbar</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 50px;
        }

        #buttons {
            margin: 20px;
        }

        .btn {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background-color: #3498db;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        .stop {
            background-color: red;
        }

        .stop:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>

<h2>Soundbar</h2>

<div id="buttons">
    <button class="btn" data-sound="sound1">Sound 1</button>
    <button class="btn" data-sound="sound2">Sound 2</button>
    <button class="btn" data-sound="sound3">Sound 3</button>
    <button class="btn stop">Stop</button>
</div>

<script>
const buttons = document.querySelectorAll(".btn");
let currentAudio = null;

buttons.forEach(button => {
    button.addEventListener("click", () => {

        // If stop button clicked
        if (button.classList.contains("stop")) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            return;
        }

        // Stop previous sound
        if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
        }

        // Play new sound
        const soundName = button.getAttribute("data-sound");
        currentAudio = new Audio(`sounds/${soundName}.mp3`);
        currentAudio.play();
    });
});
</script>

</body>
</html>
